# HTTP - redirect to HTTPS
server {
    listen 80;
    server_name chat.jawafdehi.org;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - reverse proxy to OpenWebUI
server {
    listen 443 ssl;
    server_name chat.jawafdehi.org;
    ssl_certificate /etc/letsencrypt/live/chat.jawafdehi.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.jawafdehi.org/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
