services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'WEBUI_SECRET_KEY=cdc5fcebf6b7ca3a5f89f23c0d6c98b5003dd932de3b92f30f9d4adac8bc7870'
      - 'SUPER_ADMIN_EMAILS=aa12947@nyu.edu'
      - 'DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/open_webui'
      # - 'PGVECTOR_INITIALIZE_MAX_VECTOR_LENGTH=1536' # for embedding model text-embedding-d47871
      - 'VECTOR_DB=pgvector'
      - 'ENABLE_JOB_QUEUE=false'
      - 'ENABLE_OLLAMA_API=false'
      - 'RAG_PDF_COMPLEX_PARSER_ENABLED=true'
      - 'PDF_IMAGE_DESCRIPTION_MODEL=@gpt-4o-mini/gpt-4o-mini '
      # - 'PDF_EXTRACT_IMAGES=true'
      # - 'RAG_IMAGE_EMBEDDING_MODEL_USER=@vertexai/gemini-embedding-2-preview' # when using gemini multimodal embedding model
      # Backend logging (open_webui/env.py). GLOBAL_LOG_LEVEL is the default; MAIN_ / RAG_ override per subsystem.
      - 'GLOBAL_LOG_LEVEL=WARNING'
      # - 'MAIN_LOG_LEVEL=DEBUG'
      # - 'RAG_LOG_LEVEL=DEBUG'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  open-webui: {}
