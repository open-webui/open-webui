name: Editorial CI (Fatia 1)

# Roda a suite de testes do modulo editorial em Python 3.11 (igual ao Railway).
# So dispara na branch de feature da Fatia 1 e via acionamento manual, para NAO
# interferir nos workflows de main/dev nem disparar deploy.
on:
  push:
    branches: [fatia-1-editorial]
  workflow_dispatch:

jobs:
  test-editorial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Instala SO a cadeia de import dos testes (models + db + jobs), nas MESMAS
      # versoes pinadas do projeto. As libs pesadas de ML (torch/transformers) nao
      # entram no caminho dos testes, entao ficam de fora para um CI rapido.
      - name: Install focused deps (versoes do requirements.txt)
        run: |
          python -m pip install --upgrade pip
          pip install \
            "sqlalchemy[asyncio]==2.0.48" \
            "aiosqlite==0.21.0" \
            "pydantic==2.12.5" \
            "uvicorn[standard]==0.41.0" \
            "typer" \
            "Markdown==3.10.2" \
            "beautifulsoup4==4.14.3" \
            "cryptography==46.0.5" \
            "python-docx==1.2.0" \
            "lxml" \
            "pypdf==6.7.5" \
            "pdfplumber==0.11.10" \
            "fpdf2==2.8.7" \
            "weasyprint==62.3" \
            "pytest==8.3.4" \
            "pytest-asyncio==0.25.2"

      - name: Libs nativas do WeasyPrint (cairo/pango)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev libcairo2 fonts-dejavu-core

      # EPUBCheck (Java) para validar FORMALMENTE o .epub gerado (F2.2).
      - name: Setup Java (EPUBCheck)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Baixar EPUBCheck
        run: |
          curl -sL -o epubcheck.zip https://github.com/w3c/epubcheck/releases/download/v5.1.0/epubcheck-5.1.0.zip
          unzip -q epubcheck.zip
          echo "EPUBCHECK_JAR=$PWD/epubcheck-5.1.0/epubcheck.jar" >> "$GITHUB_ENV"

      - name: Run editorial test suite
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///./ci_test.db"
          WEBUI_SECRET_KEY: "ci-not-a-real-secret"
        run: python -m pytest -v
