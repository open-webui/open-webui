name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2  # Brauchen den vorherigen Commit für den Vergleich

      - name: Check if version changed in package.json
        id: version_check
        run: |
          # Vergleich der Version zwischen dem aktuellen und dem vorherigen Commit
          CURRENT_VERSION=$(jq -r '.version' package.json)
          PREVIOUS_VERSION=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "none")

          echo "Current version:  $CURRENT_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "Version unchanged – skipping release."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Version changed from $PREVIOUS_VERSION → $CURRENT_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Extract latest CHANGELOG entry
        id: changelog
        if: steps.version_check.outputs.changed == 'true'
        run: |
          CHANGELOG_CONTENT=$(awk 'BEGIN {s=0} /^## \[/ {if(s==0){s=1}else{exit}} s{print}' CHANGELOG.md)
          # Newlines für GitHub Actions Output escapen
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if GitHub release already exists
        id: release_check
        if: steps.version_check.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = `v${{ steps.version_check.outputs.version }}`;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
              });
              console.log(`Release ${tag} already exists – skipping.`);
              core.setOutput('exists', 'true');
            } catch (e) {
              if (e.status === 404) {
                console.log(`Release ${tag} does not exist yet – will create.`);
                core.setOutput('exists', 'false');
              } else {
                throw e;
              }
            }

      - name: Create GitHub release
        if: |
          steps.version_check.outputs.changed == 'true' &&
          steps.release_check.outputs.exists == 'false'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const changelog = `${{ steps.changelog.outputs.content }}`;
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.version_check.outputs.version }}`,
              name: `v${{ steps.version_check.outputs.version }}`,
              body: changelog,
            });
            console.log(`✅ Created release: ${release.data.html_url}`);

      - name: Trigger Docker build workflow
        if: |
          steps.version_check.outputs.changed == 'true' &&
          steps.release_check.outputs.exists == 'false'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-build.yaml',
              ref: `v${{ steps.version_check.outputs.version }}`,
            });
            console.log('✅ Docker build workflow triggered.');
