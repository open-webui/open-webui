name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Validate runner prerequisites
        shell: bash
        run: |
          command -v docker >/dev/null 2>&1 || {
            echo "docker is required on the self-hosted runner" >&2
            exit 1
          }
          mkdir -p /opt/build/open-webui

      - name: Sync source to server path
        shell: bash
        run: |
          find /opt/build/open-webui -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar --exclude='.git' -cf - . | tar -xf - -C /opt/build/open-webui
          test -f /opt/build/open-webui/docker-compose.yml || {
            echo "/opt/build/open-webui/docker-compose.yml was not found after sync" >&2
            exit 1
          }

      - name: Validate compose
        shell: bash
        run: |
          docker compose -f /opt/build/open-webui/docker-compose.yml config >/dev/null

      - name: Build and restart
        shell: bash
        run: |
          docker compose -f /opt/build/open-webui/docker-compose.yml build --pull openwebui
          docker compose -f /opt/build/open-webui/docker-compose.yml up -d openwebui

      - name: Show service status
        shell: bash
        run: |
          docker compose -f /opt/build/open-webui/docker-compose.yml ps openwebui
