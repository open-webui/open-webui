name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Validate runner prerequisites
        shell: bash
        run: |
          command -v git >/dev/null 2>&1 || {
            echo "git is required on the self-hosted runner" >&2
            exit 1
          }
          command -v docker-compose >/dev/null 2>&1 || {
            echo "docker-compose is required on the self-hosted runner" >&2
            exit 1
          }
          mkdir -p /opt/build/open-webui

      - name: Update source checkout
        shell: bash
        run: |
          if [ ! -d /opt/build/open-webui/.git ]; then
            rm -rf /opt/build/open-webui
            git clone --branch main --single-branch https://github.com/Olegg000/open-webui.git /opt/build/open-webui
          fi
          cd /opt/build/open-webui
          git remote set-url origin https://github.com/Olegg000/open-webui.git
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          test -f /opt/build/open-webui/docker-compose.yml || {
            echo "/opt/build/open-webui/docker-compose.yml was not found after git update" >&2
            exit 1
          }

      - name: Validate compose
        shell: bash
        run: |
          docker-compose -p mts -f /opt/build/open-webui/docker-compose.yml config >/dev/null

      - name: Build and restart
        shell: bash
        run: |
          docker-compose -p mts -f /opt/build/open-webui/docker-compose.yml build --pull openwebui
          docker-compose -p mts -f /opt/build/open-webui/docker-compose.yml up -d openwebui

      - name: Show service status
        shell: bash
        run: |
          docker-compose -p mts -f /opt/build/open-webui/docker-compose.yml ps openwebui
