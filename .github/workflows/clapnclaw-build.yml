name: Build ClapNClaw WebUI Image

on:
  push:
    branches: [clapnclaw]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: clapnclaw/clapnclaw-webui

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Patch requirements (ddgs version fix)
        run: sed -i 's/ddgs==9.11.2/ddgs>=9.11.3/' backend/requirements.txt

      - name: Patch Dockerfile (pip3 instead of uv, NODE_OPTIONS)
        run: |
          sed -i 's|uv pip install --system -r requirements.txt --no-cache-dir|pip3 install --no-cache-dir -r requirements.txt|g' Dockerfile
          sed -i 's|# ENV NODE_OPTIONS=|ENV NODE_OPTIONS=|' Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
