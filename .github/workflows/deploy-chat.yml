name: Deploy chat.jawafdehi.org

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to deploy
        required: false
        default: jawafdehi-main
      setup_only:
        description: Run host setup only (create dirs, set permissions, then exit)
        required: false
        type: boolean
        default: false
  push:
    branches:
      - jawafdehi-main
    paths:
      - deploy/chat/**
      - .github/workflows/deploy-chat.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: monal-instance1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install SSH key and known_hosts
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.MONAL_SSH_KEY }}
          known_hosts: ${{ secrets.MONAL_SSH_KNOWN_HOSTS }}
          config: |
            Host monal-instance1
            HostName ${{ secrets.MONAL_SSH_HOST }}
            User ${{ secrets.MONAL_SSH_USER }}
            IdentityFile ~/.ssh/id_rsa

      - name: Host setup
        if: ${{ inputs.setup_only || github.event_name == 'workflow_dispatch' }}
        run: |
          ssh monal-instance1 'sudo mkdir -p /opt/openwebui /opt/openwebui-secrets && sudo chown -R $USER:$USER /opt/openwebui /opt/openwebui-secrets && if [ -d /home/ubuntu/secrets ]; then for f in .env mcp.env owui-log-writer.credentials.json; do sudo cp -n /home/ubuntu/secrets/$f /opt/openwebui-secrets/ 2>/dev/null; done; sudo chown -R $USER:$USER /opt/openwebui-secrets; fi'

      - name: Generate deploy timestamp
        if: ${{ !inputs.setup_only }}
        id: ts
        run: |
          echo "datetime=$(TZ=America/Los_Angeles date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Upload deploy bundle to host
        if: ${{ !inputs.setup_only }}
        run: |
          ssh monal-instance1 'mkdir -p /tmp/openwebui-deploy-${{ steps.ts.outputs.datetime }}'
          rsync -avz deploy/chat/ monal-instance1:/tmp/openwebui-deploy-${{ steps.ts.outputs.datetime }}/

      - name: Run deploy script on host
        if: ${{ !inputs.setup_only }}
        run: |
          ssh monal-instance1 'BUNDLE_DIR=/tmp/openwebui-deploy-${{ steps.ts.outputs.datetime }} bash /tmp/openwebui-deploy-${{ steps.ts.outputs.datetime }}/bin/deploy.sh'
