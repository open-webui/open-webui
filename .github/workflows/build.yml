name: Build and Deploy Garnet

on:
  push:
    branches:
      - garnet-privacy-proxy
    paths:
      - 'backend/privacy_proxy/**'
      - 'src/**'
      - 'backend/open_webui/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/**'

jobs:
  build-proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.changes.outputs.proxy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check proxy files changed
        id: changes
        run: |
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^backend/privacy_proxy/' \
            && echo "proxy=true" >> $GITHUB_OUTPUT \
            || echo "proxy=false" >> $GITHUB_OUTPUT

      - name: Free disk space
        if: steps.changes.outputs.proxy == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h

      - name: Login to Harbor
        if: steps.changes.outputs.proxy == 'true'
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.enclaive.cloud \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build proxy image
        if: steps.changes.outputs.proxy == 'true'
        run: |
          docker build --no-cache \
            -f backend/privacy_proxy/Dockerfile \
            -t harbor.enclaive.cloud/garnetdemo/privacy-proxy:${{ github.sha }} \
            -t harbor.enclaive.cloud/garnetdemo/privacy-proxy:latest \
            backend/privacy_proxy/

      - name: Scan proxy image for vulnerabilities
        if: steps.changes.outputs.proxy == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: harbor.enclaive.cloud/garnetdemo/privacy-proxy:${{ github.sha }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
        env:
          TRIVY_SCANNERS: vuln

      - name: Push proxy image
        if: steps.changes.outputs.proxy == 'true'
        run: |
          docker push harbor.enclaive.cloud/garnetdemo/privacy-proxy:${{ github.sha }}
          docker push harbor.enclaive.cloud/garnetdemo/privacy-proxy:latest

  deploy-proxy:
    needs: build-proxy
    if: needs.build-proxy.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy proxy to cVM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.CVM_HOST }} >> ~/.ssh/known_hosts
          ssh root@${{ secrets.CVM_HOST }} "cd /opt/garnet && \
            echo '${{ secrets.HARBOR_PASSWORD }}' | docker login harbor.enclaive.cloud \
              -u '${{ secrets.HARBOR_USERNAME }}' --password-stdin && \
            docker compose pull privacy-proxy && \
            docker compose up -d --force-recreate privacy-proxy"

      - name: Health check proxy
        run: |
          sleep 10
          ssh root@${{ secrets.CVM_HOST }} "\
            docker exec garnet-privacy-proxy-1 python3 -c \
            'import urllib.request; print(urllib.request.urlopen(\"http://localhost:8080/health\").read())'"

      - name: Run proxy tests
        run: |
          ssh root@${{ secrets.CVM_HOST }} "\
            docker exec -w /service garnet-privacy-proxy-1 python3 app/test_proxy.py"

  build-webui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.changes.outputs.webui }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check webui files changed
        id: changes
        run: |
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^src/|^backend/open_webui/' \
            && echo "webui=true" >> $GITHUB_OUTPUT \
            || echo "webui=false" >> $GITHUB_OUTPUT

      - name: Free disk space
        if: steps.changes.outputs.webui == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h

      - name: Login to Harbor
        if: steps.changes.outputs.webui == 'true'
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.enclaive.cloud \
            -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - name: Build webui image
        if: steps.changes.outputs.webui == 'true'
        run: |
          docker build --no-cache \
            -t harbor.enclaive.cloud/garnetdemo/garnet-webui:${{ github.sha }} \
            -t harbor.enclaive.cloud/garnetdemo/garnet-webui:latest \
            .

      - name: Scan webui image for vulnerabilities
        if: steps.changes.outputs.webui == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: harbor.enclaive.cloud/garnetdemo/garnet-webui:${{ github.sha }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
        env:
          TRIVY_SCANNERS: vuln

      - name: Push webui image
        if: steps.changes.outputs.webui == 'true'
        run: |
          docker push harbor.enclaive.cloud/garnetdemo/garnet-webui:${{ github.sha }}
          docker push harbor.enclaive.cloud/garnetdemo/garnet-webui:latest

  deploy-webui:
    needs: build-webui
    if: needs.build-webui.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy webui to cVM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.CVM_HOST }} >> ~/.ssh/known_hosts
          ssh root@${{ secrets.CVM_HOST }} "cd /opt/garnet && \
            echo '${{ secrets.HARBOR_PASSWORD }}' | docker login harbor.enclaive.cloud \
              -u '${{ secrets.HARBOR_USERNAME }}' --password-stdin && \
            docker compose pull open-webui && \
            docker compose up -d --force-recreate open-webui"

      - name: Health check webui
        run: |
          sleep 15
          ssh root@${{ secrets.CVM_HOST }} "\
            docker exec garnet-open-webui-1 python3 -c \
            'import urllib.request; print(urllib.request.urlopen(\"http://localhost:8080/\").read()[:50])'"
