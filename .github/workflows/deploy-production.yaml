name: Deploy Production

on:
  workflow_run:
    workflows:
      - Create and publish Docker images with specific build args
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/opt/open-webui' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}

    steps:
      - name: Validate deployment secrets
        shell: bash
        run: |
          missing=0
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_ENV_FILE; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::$var is not configured"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare deployment env file
        shell: bash
        run: |
          printf '%s\n' "$DEPLOY_ENV_FILE" > /tmp/open-webui.env

      - name: Upload deployment env file
        shell: bash
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -P "$DEPLOY_PORT" /tmp/open-webui.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"

      - name: Deploy on server
        shell: bash
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "export DEPLOY_PATH='$DEPLOY_PATH' REPOSITORY='${{ github.repository }}' && bash -s" <<'EOF'
          set -euo pipefail

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker is not installed on the server" >&2
            exit 1
          fi

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            echo "Repository is not initialized at $DEPLOY_PATH" >&2
            echo "Clone the repository on the server first and make sure git pull works there" >&2
            exit 1
          fi

          cd "$DEPLOY_PATH"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          docker compose --env-file .env up --build -d
          docker image prune -f
          EOF
