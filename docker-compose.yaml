services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
      # Tools-Entwicklungsordner: lokale .py Dateien werden beim Start sync'd
      - ./backend/open_webui/tools:/tools-sync:ro
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    # Startet Tool-Sync vor dem eigentlichen OpenWebUI-Server
    command: >
      bash -c "python /tools-sync/sync_tools_startup.py &&
               bash start.sh"
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - WEBUI_SECRET_KEY
      - OPENAI_API_BASE_URL
      - OPENAI_API_KEY
      - MICROSOFT_CLIENT_ID
      - MICROSOFT_CLIENT_SECRET
      - MICROSOFT_CLIENT_TENANT_ID
      - OPENID_PROVIDER_URL
      - ENABLE_OAUTH_SIGNUP
      - MICROSOFT_REDIRECT_URI
      - MICROSOFT_OAUTH_SCOPE
      - WEBUI_AUTH_METHOD
      - WEBUI_URL
      - SCARF_NO_ANALYTICS
      - DO_NOT_TRACK
      - ANONYMIZED_TELEMETRY
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  open-webui: {}
