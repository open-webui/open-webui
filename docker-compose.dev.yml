services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clapnclaw-webui-dev
    volumes:
      - clapnclaw-webui-dev:/app/backend/data
    ports:
      - "3000:8080"
    environment:
      - WEBUI_AUTH=False
      - ENABLE_SIGNUP=True
      - WEBUI_SECRET_KEY=dev-secret-local
      - CLAPNCLAW_API_URL=${CLAPNCLAW_API_URL:-https://api-staging.clapnclaw.io}
      - CLAPNCLAW_WORKSPACE_SECRET=${CLAPNCLAW_WORKSPACE_SECRET:-}
      - CORS_ALLOW_ORIGIN=http://localhost:3000
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
    restart: unless-stopped

volumes:
  clapnclaw-webui-dev: {}
