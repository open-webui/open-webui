services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: open-webui-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui-pg
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:8080"
    volumes:
      - ./data:/app/backend/data
    environment:
      # --- Database / Vector DB ---
      - DATABASE_URL=${DATABASE_URL}
      - VECTOR_DB=${VECTOR_DB}
      - PGVECTOR_DB_URL=${PGVECTOR_DB_URL}
      - PGVECTOR_CREATE_EXTENSION=${PGVECTOR_CREATE_EXTENSION}

      # --- Connect to vLLM (OpenAI-compatible) ---
      - ENABLE_OLLAMA_API=false
      - OPENAI_API_BASE_URLS=${VLLM_OPENAI_BASE_URL}
      - OPENAI_API_KEYS=${VLLM_OPENAI_API_KEY}
      - ENABLE_PERSISTENT_CONFIG=${ENABLE_PERSISTENT_CONFIG}
      - OFFLINE_MODE=${OFFLINE_MODE}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE}
      - RAG_EMBEDDING_ENGINE=${RAG_EMBEDDING_ENGINE}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL}
      - RAG_OPENAI_API_BASE_URL=${RAG_OPENAI_API_BASE_URL}
      - RAG_OPENAI_API_KEY=${RAG_OPENAI_API_KEY}
      - RAG_RERANKING_MODEL=${RAG_RERANKING_MODEL}
      - BYPASS_EMBEDDING_AND_RETRIEVAL=${BYPASS_EMBEDDING_AND_RETRIEVAL}
      - ENABLE_RAG_HYBRID_SEARCH=${ENABLE_RAG_HYBRID_SEARCH}
      - RAG_EMBEDDING_BATCH_SIZE=${RAG_EMBEDDING_BATCH_SIZE}
      - CHUNK_SIZE=${CHUNK_SIZE}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP}
      - TIKTOKEN_ENCODING_NAME=${TIKTOKEN_ENCODING_NAME}
      - ENABLE_MEMORIES=${ENABLE_MEMORIES}
      - USER_PERMISSIONS_FEATURES_MEMORIES=${USER_PERMISSIONS_FEATURES_MEMORIES}
      - USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ACCESS=${USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ACCESS}
      - USER_PERMISSIONS_CHAT_FILE_UPLOAD=${USER_PERMISSIONS_CHAT_FILE_UPLOAD}
      - USER_PERMISSIONS_CHAT_WEB_UPLOAD=${USER_PERMISSIONS_CHAT_WEB_UPLOAD}

      # --- LDAP ---
      - ENABLE_LDAP=true
      - LDAP_SERVER_LABEL=Company LDAP
      - LDAP_SERVER_HOST=cnt-dcp03.luxgroup.net
      - LDAP_SERVER_PORT=389
      - LDAP_USE_TLS=false
      - LDAP_VALIDATE_CERT=false
      - LDAP_APP_DN=${LDAP_APP_DN}
      - LDAP_APP_PASSWORD=${LDAP_APP_PASSWORD}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE}
      - LDAP_ATTRIBUTE_FOR_USERNAME=${LDAP_ATTRIBUTE_FOR_USERNAME}
      - LDAP_ATTRIBUTE_FOR_MAIL=${LDAP_ATTRIBUTE_FOR_MAIL}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE}
      - DEFAULT_GROUP_ID=${DEFAULT_GROUP_ID}
      - LDAP_SEARCH_FILTERS=${LDAP_SEARCH_FILTERS}

      # --- Security ---
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}

    restart: unless-stopped
