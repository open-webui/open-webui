<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="/static/favicon.png" crossorigin="use-credentials" />
		<link
			rel="icon"
			type="image/png"
			href="/static/favicon-96x96.png"
			sizes="96x96"
			crossorigin="use-credentials"
		/>
		<link
			rel="icon"
			type="image/svg+xml"
			href="/static/favicon.svg"
			crossorigin="use-credentials"
		/>
		<link rel="shortcut icon" href="/static/favicon.ico" crossorigin="use-credentials" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="/static/apple-touch-icon.png"
			crossorigin="use-credentials"
		/>
		<link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>
		<meta name="theme-color" content="#171717" />
		<meta name="robots" content="noindex,nofollow" />

		<script src="/static/loader.js" defer crossorigin="use-credentials"></script>
		<link rel="stylesheet" href="/static/custom.css" crossorigin="use-credentials" />

		<script>
			function resizeIframe(obj) {
				obj.style.height = obj.contentWindow.document.documentElement.scrollHeight + 'px';
			}
		</script>

		<script>
			// Cross-app theme sync. Reads the shared `swept_theme` cookie set by
			// swept-workbench / cloud-lock and copies it into localStorage.theme
			// BEFORE the FOUC script below runs, so Open WebUI picks up the same
			// theme the other Swept apps are rendering. Mirrors
			// src/lib/utils/theme-cookie.ts. Locally-set Open WebUI values
			// (oled-dark, her) are preserved when the cookie is absent — those
			// never propagate cross-app. The decode is wrapped in try/catch
			// so a malformed cookie value can't break first paint.
			(function () {
				try {
					var COOKIE = 'swept_theme';
					var match = document.cookie.match(new RegExp('(?:^|; )' + COOKIE + '=([^;]*)'));
					if (match) {
						var v;
						try {
							v = decodeURIComponent(match[1]);
						} catch (decodeErr) {
							v = null;
						}
						if (v === 'light' || v === 'dark' || v === 'system') {
							localStorage.setItem('theme', v);
						}
					}
				} catch (e) {}
			})();
		</script>

		<script>
			// Cross-app sidebar-collapse sync. Reads the shared
			// `swept_sidebar_collapsed` cookie set by swept-workbench (see
			// app/javascript/controllers/sidebar_collapse_controller.js there)
			// and stashes the boolean on window.__sweptSidebarCollapsed so the
			// Sidebar component can pick it up on first render — avoids a flash
			// of expanded-then-collapsed sidebar. Mirrors
			// src/lib/utils/sidebar-cookie.ts. Cookie absent ⇒ leave the global
			// undefined and let the Sidebar fall back to legacy localStorage.
			//
			// Also sets html.swept-shell-collapsed at FOUC time when the cookie
			// is true, so the @media block below renders the splash with the
			// 4rem inset on first paint (loader.js takes over once /api/config
			// resolves, but we don't want the splash to flicker between widths).
			(function () {
				try {
					var COOKIE = 'swept_sidebar_collapsed';
					var match = document.cookie.match(new RegExp('(?:^|; )' + COOKIE + '=([^;]*)'));
					if (match) {
						var v;
						try {
							v = decodeURIComponent(match[1]);
						} catch (decodeErr) {
							v = null;
						}
						if (v === 'true') {
							window.__sweptSidebarCollapsed = true;
							document.documentElement.classList.add('swept-shell-collapsed');
						} else if (v === 'false') {
							window.__sweptSidebarCollapsed = false;
						}
					}
				} catch (e) {}
			})();
		</script>

		<script>
			// On page load or when changing themes, best to add inline in `head` to avoid FOUC
			(() => {
				const metaThemeColorTag = document.querySelector('meta[name="theme-color"]');
				const prefersDarkTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;

				if (!localStorage?.theme) {
					localStorage.theme = 'system';
				}

				if (localStorage.theme === 'system') {
					document.documentElement.classList.add(prefersDarkTheme ? 'dark' : 'light');
					metaThemeColorTag.setAttribute('content', prefersDarkTheme ? '#171717' : '#ffffff');
				} else if (localStorage.theme === 'oled-dark') {
					document.documentElement.style.setProperty('--color-gray-800', '#101010');
					document.documentElement.style.setProperty('--color-gray-850', '#050505');
					document.documentElement.style.setProperty('--color-gray-900', '#000000');
					document.documentElement.style.setProperty('--color-gray-950', '#000000');
					document.documentElement.classList.add('dark');
					metaThemeColorTag.setAttribute('content', '#000000');
				} else if (localStorage.theme === 'light') {
					document.documentElement.classList.add('light');
					metaThemeColorTag.setAttribute('content', '#ffffff');
				} else if (localStorage.theme === 'her') {
					document.documentElement.classList.add('her');
					metaThemeColorTag.setAttribute('content', '#983724');
				} else {
					document.documentElement.classList.add('dark');
					metaThemeColorTag.setAttribute('content', '#171717');
				}

				const preloadHref = document.documentElement.classList.contains('dark')
					? '/static/splash-dark.png'
					: '/static/splash.png';
				const preload = document.createElement('link');
				preload.rel = 'preload';
				preload.as = 'image';
				preload.href = preloadHref;
				preload.setAttribute('fetchpriority', 'high');
				document.head.appendChild(preload);

				window.matchMedia('(prefers-color-scheme: dark)').addListener((e) => {
					if (localStorage.theme === 'system') {
						if (e.matches) {
							document.documentElement.classList.add('dark');
							document.documentElement.classList.remove('light');
							metaThemeColorTag.setAttribute('content', '#171717');
						} else {
							document.documentElement.classList.add('light');
							document.documentElement.classList.remove('dark');
							metaThemeColorTag.setAttribute('content', '#ffffff');
						}
					}
				});
				const isDarkMode = document.documentElement.classList.contains('dark');

				const logo = document.createElement('img');
				logo.id = 'logo';
				logo.style =
					'position: absolute; width: auto; height: 6rem; top: 44%; left: 50%; transform: translateX(-50%); display:block;';
				logo.loading = 'eager';
				logo.fetchPriority = 'high';
				logo.src = isDarkMode ? '/static/splash-dark.png' : '/static/splash.png';

				document.addEventListener('DOMContentLoaded', function () {
					const splash = document.getElementById('splash-screen');
					if (document.documentElement.classList.contains('her')) {
						return;
					}

					if (splash) splash.prepend(logo);
				});
			})();
		</script>

		<title>Swept Workbench</title>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<div
			id="splash-screen"
			style="position: fixed; z-index: 100; top: 0; left: 0; width: 100%; height: 100%"
		>
			<style type="text/css" nonce="">
				html {
					overflow-y: scroll !important;
				}
			</style>

			<div
				style="
					position: absolute;
					top: 33%;
					left: 50%;

					width: 24rem;
					transform: translateX(-50%);

					display: flex;
					flex-direction: column;
					align-items: center;
				"
			>
				<img
					id="logo-her"
					style="width: auto; height: 13rem"
					src="/static/splash.png"
					loading="eager"
					fetchpriority="high"
					class="animate-pulse-fast"
				/>

				<div style="position: relative; width: 24rem; margin-top: 0.5rem">
					<div
						id="progress-background"
						style="
							position: absolute;
							width: 100%;
							height: 0.75rem;

							border-radius: 9999px;
							background-color: #fafafa9a;
						"
					></div>

					<div
						id="progress-bar"
						style="
							position: absolute;
							width: 0%;
							height: 0.75rem;
							border-radius: 9999px;
							background-color: #fff;
						"
						class="bg-white"
					></div>
				</div>
			</div>

			<!-- <span style="position: absolute; bottom: 32px; left: 50%; margin: -36px 0 0 -36px">
				Footer content
			</span> -->
		</div>
	</body>

	<style type="text/css" nonce="">
		html {
			overflow-y: hidden !important;
			overscroll-behavior-y: none;
		}

		#splash-screen {
			background: #fff;
		}

		html.dark #splash-screen {
			background: #000;
		}

		html.her #splash-screen {
			background: #983724;
		}

		/* Inset the splash so the Swept shell rail (loader.js, .swept-shell at
		   left:0/width:16rem) is visible during boot. Mirrors the existing
		   1024px breakpoint and html.swept-shell-active selector used by
		   custom.css to shift the rest of the app right by 16rem. !important
		   is required to override the inline `left:0; width:100%` on
		   #splash-screen below — same trick custom.css uses for #sidebar.
		   When the shell is collapsed (swept_sidebar_collapsed cookie =
		   true → loader.js adds .swept-shell-collapsed) the inset narrows
		   to 4rem to match. */
		@media (min-width: 1024px) {
			html.swept-shell-active #splash-screen {
				left: 16rem !important;
				width: calc(100% - 16rem) !important;
			}
			html.swept-shell-active.swept-shell-collapsed #splash-screen {
				left: 4rem !important;
				width: calc(100% - 4rem) !important;
			}
		}

		#logo-her {
			display: none;
		}

		#progress-background {
			display: none;
		}

		#progress-bar {
			display: none;
		}

		html.her #logo {
			display: none;
		}

		html.her #logo-her {
			display: block;
			filter: invert(1);
		}

		html.her #progress-background {
			display: block;
		}

		html.her #progress-bar {
			display: block;
		}

		@media (max-width: 24rem) {
			html.her #progress-background {
				display: none;
			}

			html.her #progress-bar {
				display: none;
			}
		}

		@keyframes pulse {
			50% {
				opacity: 0.65;
			}
		}

		.animate-pulse-fast {
			animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
		}
	</style>
</html>
